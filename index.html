<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soulify</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #000; color: #fff; height: 100vh; overflow: hidden; }
        
        /* Full screen card container */
        .card-container { position: relative; width: 100%; height: 100vh; }
        .profile-bg { width: 100%; height: 100%; object-fit: cover; }
        
        /* Top Story Bars */
        .story-bars { position: absolute; top: 15px; left: 10px; right: 10px; display: flex; gap: 5px; z-index: 10; }
        .bar { height: 3px; flex: 1; background: rgba(255,255,255,0.3); border-radius: 2px; }
        
        /* Info Overlay */
        .info-overlay { position: absolute; bottom: 140px; left: 20px; z-index: 10; }
        .name-row { font-size: 32px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .verified { color: #2196f3; font-size: 24px; }
        
        /* Action Row (5 Buttons) */
        .action-row { position: absolute; bottom: 70px; width: 100%; display: flex; justify-content: center; gap: 15px; z-index: 10; }
        .btn { width: 55px; height: 55px; border-radius: 50%; border: 1px solid #333; background: #111; color: #fff; font-size: 20px; display: flex; align-items: center; justify-content: center; }
        
        /* Bottom Navigation (5 Icons) */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 60px; display: flex; justify-content: space-around; align-items: center; background: #000; border-top: 1px solid #222; z-index: 100; }
        .nav-icon { font-size: 24px; color: #555; }
        .nav-icon.active { color: #fe3c72; }
    </style>
</head>
<body>

<div class="card-container">
    <!-- Story Bars -->
    <div class="story-bars">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>

    <!-- Image -->
    <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=500" class="profile-bg">
    
    <!-- Info Overlay -->
    <div class="info-overlay">
        <div class="name-row">Luna 25 <span class="verified">✓</span></div>
        <p style="margin-top:5px;">😍 Looking for: Long-term, open to short</p>
    </div>

    <!-- 5 Action Buttons -->
    <div class="action-row">
        <button class="btn">🔄</button>
        <button class="btn" style="color:#ff4757;">✕</button>
        <button class="btn" style="color:#29b6f6;">★</button>
        <button class="btn" style="color:#2ed573;">💚</button>
        <button class="btn" style="color:#b388ff;">⚡</button>
    </div>
</div>

<!-- 5 Icon Navigation -->
<nav class="bottom-nav">
    <div class="nav-icon active">🔥</div>
    <div class="nav-icon">🔍</div>
    <div class="nav-icon">✨</div>
    <div class="nav-icon">💬</div>
    <div class="nav-icon">👤</div>
</nav>

</body>
</html>
