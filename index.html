<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { background-color: #000; margin: 0; padding: 0; }
        .page { display: none; height: 100vh; width: 100%; }
        #discover { display: block; } /* This ensures the screen shows up! */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 60px; display: flex; justify-content: space-around; align-items: center; background: #000; border-top: 1px solid #222; }
        .nav-icon { color: #fff; cursor: pointer; font-size: 24px; }
    </style>
</head>
<body>

    <!-- DISCOVER SCREEN -->
    <div id="discover" class="page">
        <h1 style="color:white; text-align:center; padding-top:50px;">Soulify Discover</h1>
    </div>

    <!-- MESSAGES SCREEN -->
    <div id="messages" class="page">
        <h1 style="color:white; text-align:center; padding-top:50px;">Messages Screen</h1>
    </div>

    <!-- NAVIGATION -->
    <nav class="bottom-nav">
        <div class="nav-icon" onclick="showPage('discover')">🔥</div>
        <div class="nav-icon" onclick="showPage('messages')">💬</div>
    </nav>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(page => page.style.display = 'none');
            document.getElementById(pageId).style.display = 'block';
        }
    </script>
</body>
</html>
