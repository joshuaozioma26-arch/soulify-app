<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soulify</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #0b0914; color: #ffffff; height: 100vh; overflow: hidden; }
        
        .app-view { display: none; height: 100vh; width: 100%; position: relative; }
        .active-view { display: block; }

        /* Discover Card */
        .card-container { width: 100%; height: 100vh; position: relative; }
        .card-img { width: 100%; height: 100%; object-fit: cover; }
        .card-overlay { position: absolute; bottom: 0; width: 100%; padding: 20px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); }
        
        /* Actions */
        .action-bar { display: flex; justify-content: center; gap: 15px; margin-top: 15px; }
        .btn { width: 55px; height: 55px; border-radius: 50%; border: 1px solid #333; background: #111; color: #fff; font-size: 20px; cursor: pointer; }
        
        /* Profile & VIP */
        .profile-section { padding: 20px; text-align: center; }
        .vip-banner { background: #161224; border: 1px solid #d4af37; padding: 20px; border-radius: 15px; margin-top: 20px; }
        
        /* Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; display: flex; justify-content: space-around; align-items: center; background: #0b0914; border-top: 1px solid #231d3a; }
        .nav-item { cursor: pointer; font-size: 24px; color: #585075; }
        .nav-item.active { color: #a384ff; }
    </style>
</head>
<body>

    <!-- DISCOVER VIEW -->
    <div id="view-discover" class="app-view active-view">
        <div class="card-container">
            <img class="card-img" src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=500" alt="profile">
            <div class="card-overlay">
                <h2>Sarah, 24 ✓</h2>
                <p>😍 Looking for: Long-term</p>
                <div class="action-bar">
                    <button class="btn">🔄</button>
                    <button class="btn">✕</button>
                    <button class="btn">★</button>
                    <button class="btn">💜</button>
                    <button class="btn">⚡</button>
                </div>
            </div>
        </div>
    </div>

    <!-- LIKES VIEW -->
    <div id="view-likes" class="app-view">
        <div style="padding-top: 100px; text-align: center;">
            <h3>Likes Portal Blurred</h3>
            <button onclick="window.open('https://selar.com/h3k5rsum22')">Unlock Vault (VIP)</button>
        </div>
    </div>

    <!-- PROFILE VIEW -->
    <div id="view-profile" class="app-view">
        <div class="profile-section">
            <div style="width: 100px; height: 100px; background: #333; border-radius: 50%; margin: auto;"></div>
            <h3>Alex, 18 ✓</h3>
            <div class="vip-banner">
                <h4>soulify VIP</h4>
                <p>See Who Likes You: ✓</p>
                <button onclick="window.open('https://selar.com/5j6778i289')">UPGRADE NOW</button>
            </div>
        </div>
    </div>

    <!-- NAV -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="show('view-discover')">🔥</div>
        <div class="nav-item" onclick="show('view-likes')">💎</div>
        <div class="nav-item" onclick="show('view-chat')">💬</div>
        <div class="nav-item" onclick="show('view-profile')">👤</div>
    </div>

    <script>
        function show(id) {
            document.querySelectorAll('.app-view').forEach(v => v.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }
    </script>
</body>
</html>
