<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soulify</title>
    <!-- This is the Supabase library you need -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <div id="main-view">
        <h1>Welcome to Soulify</h1>
        <button onclick="showUpgrade()">Upgrade Account</button>
    </div>

    <div id="upgrade-view" style="display:none;">
        <h1>Upgrade Page</h1>
    </div>

    <script>
        // Initialize the connection to your database
        const supabaseUrl = 'https://bzhumekesndqfnxgieuj.supabase.co';
        const supabaseKey = 'sb_publishable_eVnd6bsnvjyN3DOLlTmspQ_WMAMBvSg';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // Telegram App initialization
        const tg = window.Telegram.WebApp;
        tg.ready();

        function showUpgrade() {
            document.getElementById('main-view').style.display = 'none';
            document.getElementById('upgrade-view').style.display = 'block';
        }
    </script>
</body>
</html>
