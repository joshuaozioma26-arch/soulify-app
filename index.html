<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        /* Add this to your style section */
        .page { display: none; height: 100vh; width: 100%; }
        #discover { display: block; } /* Show discover by default */
    </style>
</head>
<body>

    <!-- DISCOVER SCREEN -->
    <div id="discover" class="page">
        <!-- Your existing card content here -->
    </div>

    <!-- MESSAGES SCREEN -->
    <div id="messages" class="page">
        <h1 style="color:white; padding: 20px;">Messages Screen</h1>
    </div>

    <!-- PROFILE SCREEN -->
    <div id="profile" class="page">
        <h1 style="color:white; padding: 20px;">Profile Screen</h1>
    </div>

    <!-- NAVIGATION -->
    <nav class="bottom-nav">
        <div class="nav-icon" onclick="showPage('discover')">🔥</div>
        <div class="nav-icon" onclick="alert('Search')">🔍</div>
        <div class="nav-icon" onclick="alert('Top Picks')">✨</div>
        <div class="nav-icon" onclick="showPage('messages')">💬</div>
        <div class="nav-icon" onclick="showPage('profile')">👤</div>
    </nav>

    <script>
        function showPage(pageId) {
            // Hide all pages
            document.querySelectorAll('.page').forEach(page => page.style.display = 'none');
            // Show the selected page
            document.getElementById(pageId).style.display = 'block';
        }
    </script>
</body>
</html>
